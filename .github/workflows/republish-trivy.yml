name: Republish On Trivy CVEs

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3am UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: republish-trivy
  cancel-in-progress: false

jobs:
  scan-and-republish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Read Prime registry secrets
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/rancher-prime-registry/credentials registry | PRIME_REGISTRY ;

      - name: Resolve latest release and base image
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' | head -n1)

          if [[ -z "$LATEST_TAG" ]]; then
            echo "No published release found; skipping scan and republish"
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_IMAGE="${GITHUB_REPOSITORY_OWNER}/hardened-csi-resizer:${LATEST_TAG}"
          echo "Latest release: ${LATEST_TAG}"
          echo "Base image: ${BASE_IMAGE}"
          echo "has_release=true" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy scan against latest release image
        if: steps.latest.outputs.has_release == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ format('{0}/{1}', env.PRIME_REGISTRY, steps.latest.outputs.base_image) }}
          format: json
          output: trivy-latest-release.json
          severity: HIGH,CRITICAL
          vuln-type: os
          ignore-unfixed: false
          exit-code: 0

      - name: Count OS HIGH/CRITICAL vulnerabilities
        if: steps.latest.outputs.has_release == 'true'
        id: vuln
        run: |
          COUNT=$(jq '[.Results[]? | select(.Class == "os-pkgs") | .Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' trivy-latest-release.json)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Detected ${COUNT} OS HIGH/CRITICAL vulnerabilities"

      - name: Read app secrets
        if: steps.vuln.outputs.count != '0'
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials appId | APP_ID ;
            secret/data/github/repo/${{ github.repository }}/github/rancher-release-team-auto-tagger/app-credentials privateKey | PRIVATE_KEY

      - name: Generate GitHub App token
        if: steps.vuln.outputs.count != '0'
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}

      - name: Republish latest release
        if: steps.vuln.outputs.count != '0'
        uses: rancher/ecm-distro-tools/actions/republish-latest@49656efa72e90062a70fac1a85ad121f4873a6a0 # v0.74.4
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          commitish: 'main'
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}